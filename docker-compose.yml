version: '3.8'

services:
  web:
    build: .
    container_name: anomaly-web
    ports:
      - "8080:5000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./app:/app
      - ./static:/static
    restart: always
    command: python app.py

  db:
    image: mysql:8.0
    container_name: anomaly-mysql
    ports:
      - "3307:3306"
    env_file:
      - .env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
    restart: always
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: anomaly-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      - db
    restart: always

volumes:
  mysql_data:
